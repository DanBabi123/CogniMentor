{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<div class="profile-container animate-fade-up">
    <h2>My Profile</h2>

    <div class="card" style="max-width: 600px;">
        <form method="POST" enctype="multipart/form-data">
            <div style="display: flex; align-items: center; margin-bottom: 30px;">
                <div class="profile-upload-container"
                    style="position: relative; width: 80px; height: 80px; margin-right: 20px;">
                    <input type="file" id="profile_pic" name="profile_pic" accept=".png, .jpg, .jpeg, .gif"
                        style="display: none;" onchange="previewImage(this)">

                    <label for="profile_pic" style="cursor: pointer; display: block; width: 100%; height: 100%;">
                        <div class="profile-img-wrapper"
                            style="width: 100%; height: 100%; border-radius: 50%; overflow: hidden; border: 2px solid #e8f0fe; position: relative;">
                            <img id="profile-preview"
                                src="{% if current_user.profile_pic and current_user.profile_pic != 'default.jpg' %}{{ url_for('static', filename='profile_pics/' + current_user.profile_pic) }}{% else %}{{ url_for('static', filename='images/default_profile.png') }}{% endif %}"
                                alt="Profile"
                                style="width: 100%; height: 100%; object-fit: cover; display: {% if current_user.profile_pic and current_user.profile_pic != 'default.jpg' %}block{% else %}none{% endif %};">

                            <div id="default-avatar"
                                style="width: 100%; height: 100%; background: #e8f0fe; display: {% if current_user.profile_pic and current_user.profile_pic != 'default.jpg' %}none{% else %}flex{% endif %}; align-items: center; justify-content: center;">
                                <span class="material-icons" style="font-size: 40px; color: #1a73e8;">person</span>
                            </div>

                            <!-- Overlay -->
                            <div class="upload-overlay"
                                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s;">
                                <span class="material-icons" style="color: white; font-size: 24px;">camera_alt</span>
                            </div>
                        </div>
                    </label>
                </div>

                <div>
                    <h3 style="margin: 0;">{{ current_user.name }}</h3>
                    <p style="color: #5f6368; margin: 5px 0;">{{ current_user.email }}</p>
                    {% if current_user.is_verified %}
                    <span class="badge"
                        style="background: #e6f4ea; color: #1e8e3e; padding: 4px 8px; border-radius: 4px; font-size: 12px;">Verified
                        Account</span>
                    {% else %}
                    <span class="badge"
                        style="background: #fce8e6; color: #c5221f; padding: 4px 8px; border-radius: 4px; font-size: 12px;">Unverified</span>
                    {% endif %}
                </div>
            </div>

            <style>
                .profile-upload-container:hover .upload-overlay {
                    opacity: 1 !important;
                }
            </style>

            <script>
                function previewImage(input) {
                    if (input.files && input.files[0]) {
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            document.getElementById('profile-preview').src = e.target.result;
                            document.getElementById('profile-preview').style.display = 'block';
                            document.getElementById('default-avatar').style.display = 'none';
                        }
                        reader.readAsDataURL(input.files[0]);
                    }
                }
            </script>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Full Name</label>
                <input type="text" name="name" value="{{ current_user.name }}" class="form-control"
                    style="width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-bottom: 20px;">Update Profile</button>

            <!-- Stub for password change -->
            <div style="border-top: 1px solid #eee; margin-top: 10px; padding-top: 20px;">
                <h4 style="margin-top: 0;">Security</h4>
                <button type="button" class="btn btn-outline"
                    style="border: 1px solid #dadce0; padding: 8px 16px; border-radius: 4px; background: white; cursor: pointer;">Change
                    Password</button>
                <button type="button" class="btn btn-outline"
                    style="border: 1px solid #dadce0; padding: 8px 16px; border-radius: 4px; background: white; cursor: pointer; margin-left: 10px;">Two-Factor
                    Authentication (OTP)</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
