{% extends "base.html" %}
{% block title %}Learning Advisor | CogniMentor{% endblock %}

{% block content %}
<div class="main-content bg-gradient-hero flex-center flex-col min-h-screen">
    <div class="glass-panel p-6" style="max-width: 800px; margin: 0 auto;">
        <div class="wizard-header text-center mb-6">
            <h2 class="section-title flex-center gap-2">
                <span class="material-icons text-primary">smart_toy</span>
                AI Learning Advisor
            </h2>
            <p class="text-muted">Tell us what you want to learn, and we'll create the perfect path.</p>
        </div>

        <form action="{{ url_for('advisor.assess') }}" method="POST">
            <div class="subject-grid">
                {% for subject in subjects %}
                <label class="subject-card">
                    <input type="radio" name="subject" value="{{ subject }}" required>
                    <div class="card-content">
                        <span class="material-icons">school</span>
                        <span style="text-align: center;">{{ subject }}</span>
                    </div>
                </label>
                {% endfor %}
            </div>

            <div class="mt-6 text-right">
                <button type="submit" class="btn btn-primary btn-lg">Next Step <span
                        class="material-icons">arrow_forward</span></button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
